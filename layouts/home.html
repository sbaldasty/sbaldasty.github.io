{{ define "main" }}
  <div class="box-link">
    {{ range .Pages }}
      <a href="{{ .RelPermalink }}">
        <b>
          {{ .Title }}
        </b>
        <p>
          {{ .Description }}
        </p>
      </a>
    {{ end }}
  </div>
{{ end }}
{{ define "about" }}
  <p>
    <strong>
      <em>
        On this page,
      </em>
    </strong>
    links into my evolving collection of imperfect yet hopefully-helping-me-grow work.
  </p>
{{ end }}
