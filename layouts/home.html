{{ define "main" }}
  <article class="slight-indent">
    {{ .Content }}
  </article>
  {{ with .GetPage "/posts" }}
    <div class="box-link">
      <a href="{{ .RelPermalink }}">
        Blog posts
      </a>
    </div>
  {{ end }}
  {{ with .GetPage "/log" }}
    <div class="box-link">
      <a href="{{ .RelPermalink }}">
        Rough daily notes about everything
      </a>
    </div>
  {{ end }}
{{ end }}
