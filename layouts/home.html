{{ define "main" }}
  <article class="slight-indent">
    {{ .Content }}
    {{ with .GetPage "/posts" }}
      <h2>
        <a href="{{ .RelPermalink }}">
          {{ .Title }}
        </a>
      </h2>
      {{ .Content }}
    {{ end }}
    {{ with .GetPage "/log" }}
      <h2>
        <a href="{{ .RelPermalink }}">
          {{ .Title }}
        </a>
      </h2>
      {{ .Content }}
    {{ end }}
  </article>
{{ end }}
