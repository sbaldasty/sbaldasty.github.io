{{ define "main" }}
  <article class="slight-indent">
    {{ .Content }}
  </article>
  {{ with .GetPage "/posts" }}
    <a href="{{ .RelPermalink }}">
      <div class="box-link">
        <h2>
          {{ .Title }}
        </h2>
        {{ .Content }}
      </div>
    </a>
  {{ end }}
  {{ with .GetPage "/log" }}
    <a href="{{ .RelPermalink }}">
      <div class="box-link">
        <h2>
          {{ .Title }}
        </h2>
        {{ .Content }}
      </div>
    </a>
  {{ end }}
{{ end }}
