{{ define "main" }}
  <div class="content-panel post-listing">
    {{ range .Pages }}
      <div>
        <h2>
          <a href="{{ .RelPermalink }}">
            {{ .Title }}
          </a>
        </h2>
        <div class="date">
          {{ dateFormat "2006-01-02" .PublishDate }}
        </div>
        <div class="description">
          {{ .Description }}
        </div>
      </div>
    {{ end }}
  </div>
{{ end }}
{{ define "about" }}
  <p>
    <strong>
      <em>
        On this page,
      </em>
    </strong>
    links to writings and pictures about my life and thoughts.
  </p>
{{ end }}
