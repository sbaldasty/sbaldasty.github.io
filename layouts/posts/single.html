{{ define "main" }}
  <article class="slight-indent">
    <header>
      <div class="title">
        {{- .Title -}}
      </div>
      <div class="by-line">
        <time>
          {{- .Date | time.Format "January 2, 2006" -}}
        </time>
      </div>
    </header>
    <div>
      {{- .Content -}}
    </div>
  </article>
{{ end }}
