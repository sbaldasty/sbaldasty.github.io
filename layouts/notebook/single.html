{{ define "main" }}
  <div class="left note">
    <div class="journal-entry">
      {{ .Content }}
    </div>
    {{ range .Resources.ByType "page" }}
      <div class="mini-post">
        <div class="header">
          {{ .Title }}
        </div>
        <div class="content">
          {{ .Content }}
        </div>
        </div>
    {{ end }}
  </div>
{{ end }}
{{ define "about" }}
  {{- .Parent.Content -}}
{{ end }}
