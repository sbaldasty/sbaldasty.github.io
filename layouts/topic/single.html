{{ define "main" }}
  <div class="left note">
    {{ range (.Site.GetPage "/notebook/2023-07-31").Resources.ByType "page" }}
      <div class="post">
        <div class="subheader">
          {{ .Title }}
        </div>
        <article class="post">
          {{ .Content }}
        </article>
      </div>
    {{ end }}
  </div>
{{ end }}
{{ define "about" }}
  {{- .Parent.Content -}}
{{ end }}
